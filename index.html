<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奥多&诺亚</title>
    <style>
        /* --- 基础背景 --- */
        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: #222 url('./bg.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'STHeiti', sans-serif;
            overflow: hidden;
        }

        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2); z-index: 1; pointer-events: none;
        }

        /* --- 核心：弹出气泡样式 --- */
        .falling-dialog {
            position: absolute;
            z-index: 10000;
            width: 100px;  /* 固定的基础大小，会被 JS 随机缩放覆盖 */
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);

            /* 内容居中显示 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
            pointer-events: none;

            /* 初始状态：在屏幕下方 */
            transform: translateY(100vh);
            animation: bubbleRise 10s linear forwards;
        }

        @keyframes bubbleRise {
            0% {
                transform: translateY(100vh) translateX(0) scale(0.6);
                opacity: 0;
            }
            10% {
                opacity: 1; /* 快速显现 */
            }
            50% {
                transform: translateY(50vh) translateX(20px) scale(1);
            }
            100% {
                transform: translateY(-20vh) translateX(-10px) scale(0.8);
                opacity: 0;
            }
        }

        @keyframes riseUp {
            0% {
                transform: translateY(100vh) translateX(0) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: translateY(90vh) translateX(10px) scale(1);
            }
            50% {
                transform: translateY(50vh) translateX(-20px);
            }
            100% {
                transform: translateY(-20vh) translateX(10px);
                opacity: 0;
            }
        }

        /* --- BGM 图标 --- */
        #music-control {
            position: fixed; top: 20px; right: 20px;
            width: 40px; height: 40px;
            z-index: 1000; cursor: pointer;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .music-icon { width: 24px; height: 24px; }
        .rotating { animation: rotate-music 3s linear infinite; }
        @keyframes rotate-music { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- 留言板 UI --- */
        #board-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); z-index: 1001; justify-content: center; align-items: center;
        }
        .board-content {
            background: #f5f5f5; width: 90%; max-width: 400px; height: 75vh;
            border-radius: 25px; display: flex; flex-direction: column; overflow: hidden;
        }
        .chat-header { background: white; padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-around; }
        .avatar-wrapper { cursor: pointer; text-align: center; opacity: 0.4; transition: 0.3s; }
        .avatar-wrapper.active { opacity: 1; transform: scale(1.1); }
        .avatar-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #ff69b4; object-fit: cover; }
        .message-list { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #f0f2f5; }

        /* 气泡样式 */
        .chat-bubble { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .bubble-left { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 2px; }
        .bubble-right { align-self: flex-end; background: #95ec69; color: #000; border-bottom-right-radius: 2px; }

        .input-area { background: white; padding: 12px; display: flex; gap: 8px; border-top: 1px solid #eee; }
        textarea { flex-grow: 1; height: 36px; border: 1px solid #ddd; border-radius: 18px; padding: 8px 15px; resize: none; outline: none; }
        .btn-send { background: #ff69b4; color: white; border: none; padding: 0 18px; border-radius: 18px; cursor: pointer; }

        #btn-open-board {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            border-radius: 50%; background: #ff69b4; color: white; border: none; cursor: pointer; z-index: 10;
        }
    </style>
</head>
<body>

    <audio id="bgm" loop preload="auto">
        <source src="./yab.mp3" type="audio/mpeg">
    </audio>

    <div id="falling-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9998;"></div>

    <div id="music-control" onclick="toggleMusic()">
        <span id="music-icon" class="music-icon">🎵</span>
    </div>

    <button id="btn-open-board" onclick="openBoard(event)">留言</button>

    <div id="board-overlay" onclick="closeBoard()">
        <div class="board-content" onclick="event.stopPropagation()">
            <div class="chat-header">
                <div class="avatar-wrapper" id="role-left" onclick="selectRole('left')">
                    <img src="./avatar1.jpg" id="img-left" class="avatar-img">
                    <div style="font-size:10px;">奥多</div>
                </div>
                <div style="align-self: center; color: #999; font-size: 13px;">正在同步水族馆...</div>
                <div class="avatar-wrapper active" id="role-right" onclick="selectRole('right')">
                    <img src="./avatar2.jpg" id="img-right" class="avatar-img">
                    <div style="font-size:10px;">诺亚</div>
                </div>
            </div>
            <div class="message-list" id="message-list"></div>
            <div class="input-area">
                <textarea id="message" placeholder="写下此刻的想法..."></textarea>
                <button class="btn-send" onclick="sendMsg()">发送</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://chixi-1y9t.onrender.com/api/messages";
        let currentRole = 'right';
        let displayedIds = new Set();
        let isInitialLoad = true;
        const bgm = document.getElementById('bgm');
        const musicCtrl = document.getElementById('music-control');

        async function loadMessages() {
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error();
                const data = await res.json();

                // 1. 更新留言板内容
                const list = document.getElementById('message-list');
                if (list) {
                    list.innerHTML = data.map(m => {
                        const sideClass = (m.user === "奥多") ? "bubble-left" : "bubble-right";
                        return `<div class="chat-bubble ${sideClass}">${m.content}</div>`;
                    }).join('');
                    list.scrollTop = list.scrollHeight;
                }

                // 2. 处理弹出逻辑
                if (data.length > 0) {
                    if (isInitialLoad) {
                        isInitialLoad = false;
                        console.log("开始依次弹出所有历史消息...");
                        // 遍历所有历史消息
                        data.forEach((msg, index) => {
                            setTimeout(() => {
                                createPopMessage(msg);
                                displayedIds.add(msg.user + msg.content + (msg.time || ""));
                            }, index * 800); // 0.8秒弹出一个，节奏紧凑
                        });
                    } else {
                        // 轮询新消息
                        const latest = data[data.length - 1];
                        const id = latest.user + latest.content + (latest.time || "");
                        if (!displayedIds.has(id)) {
                            createPopMessage(latest);
                            displayedIds.add(id);
                        }
                    }
                }
            } catch (e) {
                console.log("正在呼唤星空...");
            }
        }

        function createPopMessage(msg) {
            const container = document.getElementById('falling-container');
            if (!container) return;

            const dialog = document.createElement('div');
            dialog.className = 'falling-dialog';

            // 随机水平位置 (10% - 85%)
            const randomLeft = Math.random() * 75 + 10;
            dialog.style.left = randomLeft + 'vw';

            // 随机大小 (90px 到 130px)
            const size = Math.floor(Math.random() * 40) + 90;
            dialog.style.width = size + 'px';
            dialog.style.height = size + 'px';

            // 随机速度
            const duration = 8 + Math.random() * 4;
            dialog.style.animationDuration = duration + 's';

            // 角色颜色判断
            const userColor = (msg.user === "诺亚" || msg.user === "时久") ? "#ff69b4" : "#007aff";

            dialog.innerHTML = `
                <div style="font-size: 10px; color: ${userColor}; font-weight: bold; margin-bottom: 2px;">
                    ${msg.user}
                </div>
                <div style="font-size: 11px; color: #333; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; line-height: 1.2;">
                    ${msg.content}
                </div>
            `;

            container.appendChild(dialog);

            // 动画结束移除
            setTimeout(() => {
                if(dialog) dialog.remove();
            }, duration * 1000);
        }

        async function sendMsg() {
            const content = document.getElementById('message').value;
            if(!content) return;
            const user = (currentRole === 'right') ? "诺亚" : "奥多";

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user, content })
                });
                document.getElementById('message').value = '';
                loadMessages();
            } catch(e) { alert("水族馆暂时断开了，请重试"); }
        }

        function toggleMusic() {
            if (bgm.paused) { bgm.play(); musicCtrl.classList.add('rotating'); }
            else { bgm.pause(); musicCtrl.classList.remove('rotating'); }
        }

        function selectRole(role) {
            currentRole = role;
            document.querySelectorAll('.avatar-wrapper').forEach(el => el.classList.remove('active'));
            document.getElementById(`role-${role}`).classList.add('active');
        }

        function openBoard(e) { e.stopPropagation(); document.getElementById('board-overlay').style.display = 'flex'; loadMessages(); }
        function closeBoard() { document.getElementById('board-overlay').style.display = 'none'; }

        // 初次运行
        loadMessages();
        setInterval(loadMessages, 5000);

        // 交互触发音乐
        document.body.addEventListener('click', () => {
            if (bgm.paused) { bgm.play(); musicCtrl.classList.add('rotating'); }
        }, { once: true });
    </script>
</body>
</html>
